# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

url: https://eaststandart.github.io

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  fair:
    output: true
    permalink: /fair/:name/
  projects:
    output: true
    permalink: /projects/:name/

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

# Includes & excludes
include: ["_pages"]

# Sitemap settings
defaults:
  - scope:
      path: ""
      type: "fair"
    values:
      render_with_liquid: false
  - scope:
      path: ""
      type: "projects"
    values:
      render_with_liquid: false
      
