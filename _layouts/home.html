<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <style>
        /* Стили только для главной страницы */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            margin-top: 0;
        }

        .category-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 8px solid;
            transition: transform 0.2s;
        }
        .category-card:hover { transform: translateY(-5px); }
        .tech-creative { border-top-color: var(--card-tech); }
        .my-projects { border-top-color: var(--card-my); }

        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .section-icon { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #eee; 
            background: #fff; 
        }

/* Финальные стили для блока обновлений */
.site-news { 
    border-top-color: #cb2431; 
}

/* Элемент списка новостей — теперь эффект ховера живет здесь */
.news-item-compact { 
    display: flex; 
    align-items: center; 
    margin-bottom: 4px !important; 
    font-size: 0.9rem; 
    line-height: 1.3; 
    padding: 3px 8px;
    border-radius: 6px;
    background: #f9f9f9;
    transition: 0.2s;
    border: 1px solid transparent;
}

/* Эффект наведения на всю строку новости */
.news-item-compact:hover { 
    background: #fff; 
    border-color: #ddd; 
    padding-left: 18px; 
}

/* Дата новости */
.news-item-compact small { 
    flex-shrink: 0; 
    font-family: monospace; 
    color: #6a737d;
}

/* Ссылка на новость/проект */
.news-item-compact .item-link { 
    margin-left: 10px; 
    text-decoration: none;
    font-weight: normal;
    transition: 0.2s;
}

/* Меняем цвет текста при наведении на строку */
.news-item-compact:hover .item-link {
    color: #000 !important;
}
        
        h1 { margin-bottom: 20px !important; }
        h2 { margin: 0; font-size: 1.3rem; color: #333; }
        header { margin-bottom: 10px !important; }
        
        .project-list { list-style: none; padding: 0; margin: 0; }
        .project-list li { margin-bottom: 12px; }
        .project-list a {
            text-decoration: none;
            color: #555;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            background: #f9f9f9;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        
        .project-list a:hover { 
            background: #fff; 
            color: #000; 
            border-color: #ddd; 
            padding-left: 18px; 
        }

    @media (max-width: 900px) {
    .grid-container {
        max-width: 100% !important;
        gap: 15px; /* Уменьшаем зазор на мобилках */
    }
    
    .category-card {
        padding: 15px !important; /* Уплотняем карточки на главной */
    }

    .card-header {
        margin-bottom: 10px !important;
    }
}
    </style>
</head>
<body>
    <header>
        <img src="/assets/icons/logo.svg" alt="Логотип" class="main-avatar">
        <h1>{{ page.title }}</h1>
    </header>

    {{ content }}

    <footer class="main-footer">
        <a href="https://t.me/eaststandart" target="_blank" class="tg-button">
            <span>✈️</span> Написать в Telegram
        </a>        
    </footer>

{% include footer.liquid %}

</body>
</html>
